        - name: ­¤ōü Create/Update Github Latest Release
          continue-on-error: true
          if: ${{ (github.event_name == 'schedule' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) }}
          uses: mini-bomba/create-github-release@v1.2.0
          with:
            token: ${{ secrets.gh_token }}
            tag: "latest"
            prerelease: false
            name: "Latest Firmware"
            body: |
              Latest successful SlimeNRF Firmware build. (Automated)
            files: |
              Releases/*.hex
              Releases/*.uf2
            clear_attachments: false

        - name: ­¤ōü Create/Update Github Daily Release
          continue-on-error: true
          if: ${{ (github.event_name == 'schedule' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) }}
          uses: mini-bomba/create-github-release@v1.2.0
          with:
