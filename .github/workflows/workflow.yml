on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 */12 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

env:
  ZEPHYR_SDK_VERSION: "0.17.4"

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: 🧰 Cache + Install apt Dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            git cmake ninja-build gperf dfu-util device-tree-compiler wget
            python3-dev python3-pip python3-setuptools python3-tk python3-wheel python3-venv
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          version: 1.0

      - name: 📦 Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}

      - name: 🪁 Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q -O zephyr-sdk_linux-x86_64_minimal.tar.xz https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${{ env.ZEPHYR_SDK_VERSION }}/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk_linux-x86_64_minimal.tar.xz -C ~/
          rm -rf ~/zephyr-sdk
          mv ~/zephyr-sdk-*/ ~/zephyr-sdk
          ~/zephyr-sdk/setup.sh -c -t arm-zephyr-eabi

      - name: 📦 Cache Python Venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-${{ env.ZEPHYR_SDK_VERSION }}-base

      - name: 🐍 Setup Python Venv + West
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv ~/.venv
          ~/.venv/bin/pip install west ninja

  generate_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: 💻 Checkout Repository
        uses: actions/checkout@v5

      - name: 🧮 Generate build matrix from JSON
        id: gen
        run: |
          set -euo pipefail

          MATRIX_FILE="boards.matrix.json"
          if [ ! -f "$MATRIX_FILE" ] && [ -f "SlimeNRF-Firmware-CI/boards.matrix.json" ]; then
            MATRIX_FILE="SlimeNRF-Firmware-CI/boards.matrix.json"
          fi

          MATRIX="$(jq -c '
            def cartesian($obj):
              reduce ($obj | keys[]) as $k
                ([{}]; [ .[] as $a | $obj[$k][] as $v | ($a + {($k): $v}) ]);

            def merge_source_profile($v; $profiles; $sources):
              ($sources[$v.source]) as $s
              | if $s == null then
                  error("Unknown source key: \($v.source)")
                else
                  ($profiles[$s.profile]) as $p
                  | if $p == null then
                      error("Unknown profile key in source: \($s.profile)")
                    else
                      ($v + $s + $p | del(.source, .profile))
                    end
                end;

            def hasVar($v; $k):
              (($v.matrix // {}) | has($k));

            def mk_filename($v; $cfg):
              ($v.name_style // "combined") as $style
              | ($v.source == "slimevr_tracker_nrf_tdma") as $is_tdma
              | (["SlimeNRF", "Tracker"] + (if $is_tdma then ["TDMA"] else [] end)) as $base
              | ($v.name.bus? // null) as $bus
              | ($v.name.board) as $board
              | if $style == "noclk" then
                  ($base
                    + (if hasVar($v; "clk") and ($cfg.clk == "disabled") then ["NoCLK"] else [] end)
                    + (if hasVar($v; "sleep") and ($cfg.sleep == "disabled") then ["NoSleep"] else [] end)
                    + (if $bus != null then [$bus] else [] end)
                    + (if hasVar($v; "magnetometer") and ($cfg.magnetometer == "enabled") then ["Mag"] else [] end)
                    + [$board]
                  ) | join("_")
                else
                  (hasVar($v; "sleep") and ($cfg.sleep == "disabled")) as $sleep_off
                  | (hasVar($v; "clk") and ($cfg.clk == "enabled")) as $clk_on
                  | (if $sleep_off and $clk_on then "NoSleepCLK"
                     elif $sleep_off then "NoSleep"
                     elif $clk_on then "CLK"
                     else null end) as $sleepclk
                  | ($base
                      + (if hasVar($v; "sw0") and ($cfg.sw0 == "enabled") then ["SW0"] else [] end)
                      + (if $sleepclk != null then [$sleepclk] else [] end)
                      + (if $bus != null then [$bus] else [] end)
                      + (if hasVar($v; "magnetometer") and ($cfg.magnetometer == "enabled") then ["Mag"] else [] end)
                      + [$board]
                    ) | join("_")
                end;

            def expand($v; $profiles; $sources):
              if ($v.matrix? // null) == null then
                [($v
                  | merge_source_profile(.; $profiles; $sources)
                  | del(.defaults, .matrix, .name, .name_style)
                )]
              else
                (cartesian($v.matrix)
                  | map(
                      . as $combo
                      | (($v.defaults // {}) + $combo) as $cfg
                      | ($v
                        | merge_source_profile(.; $profiles; $sources)
                        | . + $cfg
                        | .filename = mk_filename($v; $cfg)
                        | del(.defaults, .matrix, .name, .name_style)
                      )
                    )
                )
              end;

            . as $root
            | ($root.profiles) as $profiles
            | ($root.sources) as $sources
            | {boards: (
                $root.variants
                | map(expand(.; $profiles; $sources))
                | add
              )}
          ' "$MATRIX_FILE")"

          echo "Matrix JSON length: ${#MATRIX}"
          if [ ${#MATRIX} -gt 900000 ]; then
            echo "Matrix output too large for GITHUB_OUTPUT (${#MATRIX} bytes)" >&2
            exit 1
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  resolve-sources:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.hash.outputs.cache_key }}
    steps:

      - name: 💻 Checkout Repository
        uses: actions/checkout@v5

      - name: 📄 Install jq
        run: sudo apt-get install -y jq

      - name: 🏷️ Generate Daily Tag
        id: daily-tag
        run: |
          TAG_NAME="daily-$(date -u +%Y%m%d)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: 🏷️ Create or Update Tag
        run: |
          TAG_NAME="${{ steps.daily-tag.outputs.tag_name }}"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag -f "$TAG_NAME"
          git push -f origin "$TAG_NAME"

      - name: 🔎 Resolve Source Hashes
        id: resolve-repositories
        run: |
          mkdir -p hashes
          echo "{}" > hashes/sources.json
          jq -r '.sources[] | "\(.repository_url) \(.repository_revision)"' boards.matrix.json \
          | while read repo rev; do
            owner_repo=$(echo "$repo" | sed -E 's#https://github.com/([^/]+/[^/]+).*#\1#')
            sha=$(curl -s https://api.github.com/repos/$owner_repo/commits/$rev | jq -r '.sha')
            key="firmware:${repo}@${rev}"
            jq --arg k "$key" --arg v "$sha" '. + {($k):$v}' hashes/sources.json > tmp.json
            mv tmp.json hashes/sources.json
          done

      - name: 🔎 Resolve Repository Hashes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p hashes
          MATRIX_FILE="boards.matrix.json"
          resolve_sha () {
            git ls-remote "$1" \
              "refs/heads/$2" \
              "refs/tags/$2" \
              "$2" | head -n1 | awk '{print $1}'
          }
          echo "{}" > hashes/sources.json

          sleep 1

          # Resolve CI Repository Hash
          CI_URL="https://github.com/${GITHUB_REPOSITORY}"
          CI_BRANCH="${GITHUB_REF_NAME}"
          CI_SHA="$(resolve_sha "$CI_URL" "$CI_BRANCH")"
          CI_SHORT="$(echo "$CI_SHA" | cut -c1-7)"
          CI_MESSAGE=$(git log -1 --pretty=%B)
          jq \
          --arg url "$CI_URL" \
          --arg branch "$CI_BRANCH" \
          --arg sha "$CI_SHA" \
          --arg short "$CI_SHORT" \
          --arg message "$CI_MESSAGE" \
          '.ci = {
            repository: $url,
            branch: $branch,
            commit: $sha,
            short_commit: $short,
            message: $message
          }'
            hashes/sources.json > hashes/tmp.json
          mv hashes/tmp.json hashes/sources.json

          sleep 1

          # Resolve SDK Hashes
          jq -r '.profiles[] | "\(.sdk_url) \(.sdk_revision)"' "$MATRIX_FILE" \
          | sort -u | while read url rev; do
            sha=$(resolve_sha "$url" "$rev")
            key="${url}@${rev}"
            jq \
              --arg key "$key" \
              --arg sha "$sha" \
              '.sdk[$key]=$sha' \
              hashes/sources.json > hashes/tmp.json
            mv hashes/tmp.json hashes/sources.json
          done

          sleep 1

          # Resolve Firmware Repository Hashes
          jq -r '.sources[] | "\(.repository_url) \(.repository_revision)"' "$MATRIX_FILE" \
          | sort -u | while read url rev; do
            sha=$(resolve_sha "$url" "$rev")
            key="${url}@${rev}"
            jq \
              --arg key "$key" \
              --arg sha "$sha" \
              '.firmware[$key]=$sha' \
              hashes/sources.json > hashes/tmp.json
            mv hashes/tmp.json hashes/sources.json
          done

          sleep 1

          # Store Daily Tag
          jq --arg tag "$TAG_NAME" '.tag.name=$tag' hashes/sources.json > hashes/tmp.json
          mv hashes/tmp.json hashes/sources.json

      - name: 📦 Cache Source Hashes
        uses: actions/cache@v4
        with:
          path: hashes/sources.json
          key: hashes-${{ github.run_id }}

      - name: 💾 Artifact Source Hashes
        uses: actions/upload-artifact@v5
        with:
          name: Source_Hashes
          path: hashes/sources.json

  build:
    needs: [setup, generate_matrix, resolve-sources]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:

      - name: 💻 Checkout Repository
        uses: actions/checkout@v5

      - name: 📦 Restore Hash Cache
        uses: actions/cache@v4
        with:
          path: hashes/sources.json
          key: hashes-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: 📟 Restore CI Env Variables
        shell: bash
        run: |
          set -euo pipefail

          CI_SHA=$(jq -r '.ci.commit' hashes/sources.json)
          CI_SHORT=$(jq -r '.ci.short_commit' hashes/sources.json)
          CI_MESSAGE=$(jq -r '.ci.message' hashes/sources.json)

          echo "CI_COMMIT=$CI_SHA" >> $GITHUB_ENV
          echo "CI_COMMIT_SHORT=$CI_SHORT" >> $GITHUB_ENV

          echo "GIT_HASH=$CI_SHORT" >> $GITHUB_ENV

          echo "GIT_MESSAGE<<EOF" >> $GITHUB_ENV
          echo "$CI_MESSAGE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🏷️ Restore Tag Name
        run: |
          jq --arg tag "$TAG_NAME" '.tag.name=$tag' hashes/sources.json > hashes/tmp.json
          mv hashes/tmp.json hashes/sources.json

      - name: 🔎 Lookup SDK hash
        id: sdk-hash
        shell: bash
        run: |
          set -euo pipefail
          key="${{ matrix.boards.sdk_url }}@${{ matrix.boards.sdk_revision }}"
          sha=$(jq -r --arg key "$key" '.sdk[$key]' hashes/sources.json)
          echo "sdk_sha=$sha" >> "$GITHUB_OUTPUT"

      - name: 🔎 Lookup Firmware Hash
        id: firmware-hash
        shell: bash
        run: |
          set -euo pipefail
          key="${{ matrix.boards.repository_url }}@${{ matrix.boards.repository_revision }}"
          sha=$(jq -r --arg key "$key" '.firmware[$key]' hashes/sources.json)
          echo "firmware_sha=$sha" >> "$GITHUB_OUTPUT"

  delete-cache:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Delete cache by key
        uses: MySkylight/delete-cache-by-key@v2
        with:
          key: hashes-${{ github.run_id }}
          mode: exact