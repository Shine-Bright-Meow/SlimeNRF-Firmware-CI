on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 */12 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

env:
  ZEPHYR_SDK_VERSION: "0.17.4"

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: 🧰 Cache + Install apt Dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            git cmake ninja-build gperf dfu-util device-tree-compiler wget
            python3-dev python3-pip python3-setuptools python3-tk python3-wheel python3-venv
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          version: 1.0

      - name: 📦 Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}

      - name: 🪁 Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q -O zephyr-sdk_linux-x86_64_minimal.tar.xz https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${{ env.ZEPHYR_SDK_VERSION }}/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk_linux-x86_64_minimal.tar.xz -C ~/
          rm -rf ~/zephyr-sdk
          mv ~/zephyr-sdk-*/ ~/zephyr-sdk
          ~/zephyr-sdk/setup.sh -c -t arm-zephyr-eabi

      - name: 📦 Cache Python Venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-${{ env.ZEPHYR_SDK_VERSION }}-base

      - name: 🐍 Setup Python Venv + West
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv ~/.venv
          ~/.venv/bin/pip install west ninja

  generate_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: 💻 Checkout Repository
        uses: actions/checkout@v5

      - name: 🧮 Generate build matrix from JSON
        id: gen
        run: |
          set -euo pipefail

          MATRIX_FILE="boards.matrix.json"
          if [ ! -f "$MATRIX_FILE" ] && [ -f "SlimeNRF-Firmware-CI/boards.matrix.json" ]; then
            MATRIX_FILE="SlimeNRF-Firmware-CI/boards.matrix.json"
          fi

          MATRIX="$(jq -c '
            def cartesian($obj):
              reduce ($obj | keys[]) as $k
                ([{}]; [ .[] as $a | $obj[$k][] as $v | ($a + {($k): $v}) ]);

            def merge_source_profile($v; $profiles; $sources):
              ($sources[$v.source]) as $s
              | if $s == null then
                  error("Unknown source key: \($v.source)")
                else
                  ($profiles[$s.profile]) as $p
                  | if $p == null then
                      error("Unknown profile key in source: \($s.profile)")
                    else
                      ($v + $s + $p | del(.source, .profile))
                    end
                end;

            def hasVar($v; $k):
              (($v.matrix // {}) | has($k));

            def mk_filename($v; $cfg):
              ($v.name_style // "combined") as $style
              | ($v.source == "slimevr_tracker_nrf_tdma") as $is_tdma
              | (["SlimeNRF", "Tracker"] + (if $is_tdma then ["TDMA"] else [] end)) as $base
              | ($v.name.bus? // null) as $bus
              | ($v.name.board) as $board
              | if $style == "noclk" then
                  ($base
                    + (if hasVar($v; "clk") and ($cfg.clk == "disabled") then ["NoCLK"] else [] end)
                    + (if hasVar($v; "sleep") and ($cfg.sleep == "disabled") then ["NoSleep"] else [] end)
                    + (if $bus != null then [$bus] else [] end)
                    + (if hasVar($v; "magnetometer") and ($cfg.magnetometer == "enabled") then ["Mag"] else [] end)
                    + [$board]
                  ) | join("_")
                else
                  (hasVar($v; "sleep") and ($cfg.sleep == "disabled")) as $sleep_off
                  | (hasVar($v; "clk") and ($cfg.clk == "enabled")) as $clk_on
                  | (if $sleep_off and $clk_on then "NoSleepCLK"
                     elif $sleep_off then "NoSleep"
                     elif $clk_on then "CLK"
                     else null end) as $sleepclk
                  | ($base
                      + (if hasVar($v; "sw0") and ($cfg.sw0 == "enabled") then ["SW0"] else [] end)
                      + (if $sleepclk != null then [$sleepclk] else [] end)
                      + (if $bus != null then [$bus] else [] end)
                      + (if hasVar($v; "magnetometer") and ($cfg.magnetometer == "enabled") then ["Mag"] else [] end)
                      + [$board]
                    ) | join("_")
                end;

            def expand($v; $profiles; $sources):
              if ($v.matrix? // null) == null then
                [($v
                  | merge_source_profile(.; $profiles; $sources)
                  | del(.defaults, .matrix, .name, .name_style)
                )]
              else
                (cartesian($v.matrix)
                  | map(
                      . as $combo
                      | (($v.defaults // {}) + $combo) as $cfg
                      | ($v
                        | merge_source_profile(.; $profiles; $sources)
                        | . + $cfg
                        | .filename = mk_filename($v; $cfg)
                        | del(.defaults, .matrix, .name, .name_style)
                      )
                    )
                )
              end;

            . as $root
            | ($root.profiles) as $profiles
            | ($root.sources) as $sources
            | {boards: (
                $root.variants
                | map(expand(.; $profiles; $sources))
                | add
              )}
          ' "$MATRIX_FILE")"

          echo "Matrix JSON length: ${#MATRIX}"
          if [ ${#MATRIX} -gt 900000 ]; then
            echo "Matrix output too large for GITHUB_OUTPUT (${#MATRIX} bytes)" >&2
            exit 1
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    needs: [setup, generate_matrix]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:

      - name: 💻 Checkout Repository
        uses: actions/checkout@v5

      - name: 🔎 Resolve Remote Commit
        id: resolve-commit
        run: |
          COMMIT=$(git ls-remote "${{ matrix.boards.repository_url }}" "${{ matrix.boards.repository_revision }}" | cut -f1)
          echo "COMMIT=$COMMIT" >> $GITHUB_OUTPUT

      - name: 📝 Put Commit Hash/Name in Env Variables
        run: |
          echo "GIT_HASH=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "GIT_MESSAGE<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🏷️ Generate Tag
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
        run: |
          echo "TAG_NAME=daily-$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: 🏷️ Create or Update Tag
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -f "${TAG_NAME}"
          git push -f origin "${TAG_NAME}"

      - name: 🧰 Cache + Install apt Dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            git cmake ninja-build gperf dfu-util device-tree-compiler wget
            python3-dev python3-pip python3-setuptools python3-tk python3-wheel python3-venv
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          version: 1.0

      - name: 📦 Restore Zephyr SDK
        uses: actions/cache/restore@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          fail-on-cache-miss: true

      - name: 🪁 Register Zephyr SDK
        run: |
          ~/zephyr-sdk/setup.sh -c -t arm-zephyr-eabi

      - name: 💻 Checkout CI Manifest Repo (for west init)
        uses: actions/checkout@v5
        with:
          path: zephyr-workspace/SlimeNRF-CI

      - name: 🔎 Resolve NCS (sdk-nrf) SHA for West Workspace Cache Key
        id: sdk_sha
        shell: bash
        run: |
          set -euo pipefail
          SDK_URL='${{ matrix.boards.sdk_url }}'
          SDK_REV='${{ matrix.boards.sdk_revision }}'

          SDK_SHA="$(git ls-remote "$SDK_URL" \
            "refs/heads/$SDK_REV" \
            "refs/tags/$SDK_REV" \
            "$SDK_REV" \
            | head -n 1 | awk '{print $1}')"

          if [ -z "$SDK_SHA" ]; then
            echo "Failed to resolve SDK SHA for $SDK_URL @ $SDK_REV" >&2
            exit 1
          fi

          SDK_URL_HASH="$(printf %s "$SDK_URL" | sha256sum | cut -c1-12)"

          echo "sdk_sha=$SDK_SHA" >> "$GITHUB_OUTPUT"
          echo "sdk_url_hash=$SDK_URL_HASH" >> "$GITHUB_OUTPUT"

      - name: 📦 Cache West Workspace (by SDK SHA)
        id: cache-west
        uses: actions/cache@v4
        with:
          path: |
            zephyr-workspace/.west
            zephyr-workspace/zephyr
            zephyr-workspace/nrf
            zephyr-workspace/modules
            zephyr-workspace/nrfxlib
            zephyr-workspace/bootloader
            zephyr-workspace/tools
          key: west-workspace-${{ env.ZEPHYR_SDK_VERSION }}-${{ steps.sdk_sha.outputs.sdk_url_hash }}-${{ steps.sdk_sha.outputs.sdk_sha }}

      - name: 📦 Restore Python Venv
        id: restore-venv
        uses: actions/cache/restore@v4
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-${{ env.ZEPHYR_SDK_VERSION }}-base
          restore-keys: |
            venv-${{ runner.os }}-${{ env.ZEPHYR_SDK_VERSION }}-

      - name: ♻️ Initialize Zephyr Workspace
        run: |
          echo "$HOME/.venv/bin" >> $GITHUB_PATH
          export PATH="$HOME/.venv/bin:$PATH"

          sed -i '/- name:[[:space:]]*sdk-nrf/,/import:/ { s|url:[[:space:]]*.*|url: ${{ matrix.boards.sdk_url }}|; s|revision:[[:space:]]*.*|revision: ${{ matrix.boards.sdk_revision }}|; }' zephyr-workspace/SlimeNRF-CI/west.yml

          mkdir -p zephyr-workspace
          cd zephyr-workspace

          if [ "${{ steps.cache-west.outputs.cache-hit }}" != "true" ]; then
            sudo rm -rf .west zephyr nrf modules nrfxlib bootloader tools
            west init -l SlimeNRF-CI
            west update --narrow -o=--depth=1
          fi

          west zephyr-export

      - name: 📦 Restore Zephyr Python Requirements
        id: cache-pip
        uses: actions/cache/restore@v4
        with:
          path: ~/.venv
          key: venv-pip-${{ runner.os }}-${{ env.ZEPHYR_SDK_VERSION }}-zephyr-${{ hashFiles('zephyr/scripts/requirements.txt') }}
          restore-keys: |
            venv-pip-${{ runner.os }}-${{ env.ZEPHYR_SDK_VERSION }}-zephyr-

      - name: 🐍 Install Zephyr Python Requirements
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          cd zephyr-workspace
          ~/.venv/bin/pip install -r zephyr/scripts/requirements.txt

      - name: 📦 Save Zephyr Python Requirements
        if: steps.cache-pip.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.venv
          key: venv-pip-${{ runner.os }}-${{ env.ZEPHYR_SDK_VERSION }}-zephyr-${{ hashFiles('zephyr/scripts/requirements.txt') }}

      - name: 📦 Restore Repository
        id: cache-repository
        uses: actions/cache/restore@v4
        with:
          path: zephyr-workspace/SlimeVR-Tracker-nRF
          key: firmware-${{ steps.resolve-commit.outputs.COMMIT }}

      - name: 💻 Clone Repository
        if: steps.cache-repository.outputs.cache-hit != 'true'
        run: |
          cd zephyr-workspace
          rm -rf SlimeVR-Tracker-nRF
          git clone --filter=blob:none --no-checkout "${{ matrix.boards.repository_url }}" SlimeVR-Tracker-nRF
          git -C SlimeVR-Tracker-nRF checkout ${{ steps.resolve-commit.outputs.COMMIT }}
          git -C SlimeVR-Tracker-nRF submodule update --init --recursive --depth 1

      - name: 📦 Save Repository Cache
        if: steps.cache-repository.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: zephyr-workspace/SlimeVR-Tracker-nRF
          key: firmware-${{ steps.resolve-commit.outputs.COMMIT }}

      - name: 🔧 Preparing Build Environment
        run: |
          cd zephyr-workspace
          sudo rm -rf Releases
          mkdir Releases

      - name: 🔧 Configure Tracker Options
        if: ${{ matrix.boards.type == 'tracker' }}
        shell: bash
        run: |
          set -euo pipefail
          cd zephyr-workspace

          CLK='${{ matrix.boards.clk }}'
          EXTRA='${{ matrix.boards.extraaction }}'
          MAG='${{ matrix.boards.magnetometer }}'
          SLEEP='${{ matrix.boards.sleep }}'
          SW0='${{ matrix.boards.sw0 }}'

          append_conf() { printf "\n\n%s" "$1" >> SlimeVR-Tracker-nRF/prj.conf; }

          if [ "$CLK" = "disabled" ]; then
            sed -i 's|clk-gpios[[:space:]]*=|// clk-gpios =|g' SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts
            sed -i 's|clk-gpios[[:space:]]*=|// clk-gpios =|g' SlimeVR-Tracker-nRF/boards/xiao_ble.overlay
            sed -i 's|clk-gpios[[:space:]]*=|// clk-gpios =|g' SlimeVR-Tracker-nRF/boards/xiao_ble_nrf52840_sense.overlay
            append_conf 'CONFIG_USE_SENSOR_CLOCK=n'
          elif [ "$CLK" = "enabled" ]; then
            sed -i 's|//[[:space:]]*clk-gpios|clk-gpios|g' SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts
            sed -i 's|//[[:space:]]*clk-gpios|clk-gpios|g' SlimeVR-Tracker-nRF/boards/xiao_ble.overlay
            append_conf 'CONFIG_USE_SENSOR_CLOCK=y'
          fi

          if [ "$EXTRA" = "disabled" ]; then
            append_conf 'CONFIG_USER_EXTRA_ACTIONS=n'
          elif [ "$EXTRA" = "enabled" ]; then
            append_conf 'CONFIG_USER_EXTRA_ACTIONS=y'
          fi

          if [ "$MAG" = "disabled" ]; then
            append_conf 'CONFIG_SENSOR_USE_MAG=n'
          elif [ "$MAG" = "enabled" ]; then
            append_conf 'CONFIG_SENSOR_USE_MAG=y'
          fi

          if [ "$SLEEP" = "disabled" ]; then
            append_conf 'CONFIG_USE_IMU_WAKE_UP=n'
            append_conf 'CONFIG_USE_ACTIVE_TIMEOUT=n'
            append_conf 'CONFIG_SENSOR_LP_TIMEOUT=300000'
            append_conf 'CONFIG_SENSOR_USE_LOW_POWER_2=n'
          elif [ "$SLEEP" = "enabled" ]; then
            append_conf 'CONFIG_USE_IMU_WAKE_UP=y'
            append_conf 'CONFIG_USE_ACTIVE_TIMEOUT=y'
          fi

          if [ "$SW0" = "disabled" ]; then
            sed -i 's|sw0[[:space:]]*=|// sw0 =|g' SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts
            sed -i 's|sw0[[:space:]]*=|// sw0 =|g' SlimeVR-Tracker-nRF/boards/xiao_ble.overlay
            sed -i 's|sw0[[:space:]]*=|// sw0 =|g' SlimeVR-Tracker-nRF/boards/xiao_ble_nrf52840_sense.overlay
          elif [ "$SW0" = "enabled" ]; then
            sed -i 's|//[[:space:]]*sw0[[:space:]]*=|sw0 =|g' SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts
            sed -i 's|//[[:space:]]*sw0[[:space:]]*=|sw0 =|g' SlimeVR-Tracker-nRF/boards/xiao_ble.overlay
            sed -i 's|//[[:space:]]*sw0[[:space:]]*=|sw0 =|g' SlimeVR-Tracker-nRF/boards/xiao_ble_nrf52840_sense.overlay
          fi

      - name: 🔨 Stacked Prep
        if: ${{ (matrix.boards.type == 'tracker') && (contains(matrix.boards.filename, 'Stacked')) }}
        run: |
          # To Do: Cache Stacked Variant and other Custom boards when they are ready.
          cd zephyr-workspace
          printf "\n\nCONFIG_SENSOR_USE_6_SIDE_CALIBRATION=y" >> SlimeVR-Tracker-nRF/prj.conf
          sudo rm -f SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/board.c
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/pm_static_promicro_uf2_nrf52840_stackedi2c.yml -o SlimeVR-Tracker-nRF/pm_static_promicro_uf2_nrf52840_stackedi2c.yml
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/pm_static_promicro_uf2_nrf52840_stackedspi.yml -o SlimeVR-Tracker-nRF/pm_static_promicro_uf2_nrf52840_stackedspi.yml
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/socs/nrf52840_stackedi2c.overlay -o SlimeVR-Tracker-nRF/socs/nrf52840_stackedi2c.overlay
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/socs/nrf52840_stackedspi.overlay -o SlimeVR-Tracker-nRF/socs/nrf52840_stackedspi.overlay
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/boards/nordic/promicro_uf2/promicro_uf2_stackedi2c.yaml -o SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2_stackedi2c.yaml
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/boards/nordic/promicro_uf2/promicro_uf2_stackedi2c_defconfig -o SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2_stackedi2c_defconfig
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/boards/nordic/promicro_uf2/promicro_uf2_stackedspi.yaml -o SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2_stackedspi.yaml
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/boards/nordic/promicro_uf2/promicro_uf2_stackedspi_defconfig -o SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2_stackedspi_defconfig
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/boards/nordic/promicro_uf2/promicro_uf2_stackedi2c.dts -o SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2_stackedi2c.dts
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/boards/nordic/promicro_uf2/promicro_uf2_stackedspi.dts -o SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2_stackedspi.dts
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/boards/nordic/promicro_uf2/board.yml -o SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/board.yml
          curl -fSL https://raw.githubusercontent.com/Shine-Bright-Meow/SlimeNRF-Tracker/stacked-variant/boards/nordic/promicro_uf2/board.c -o SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/board.c

      - name: 🔨 Build SlimeVR-Tracker-nRF - ${{ matrix.boards.boardname }}
        run: |
          cd zephyr-workspace
          sed -i '/printk(FW_STRING);/a printk(\"Build from '${{ github.repository }}'\\n\");' SlimeVR-Tracker-nRF/src/console.c
          sudo rm -rf SlimeVR-Tracker-nRF/build
          mkdir SlimeVR-Tracker-nRF/build

          west build \
              --board ${{ matrix.boards.boardname }} \
              --pristine=always SlimeVR-Tracker-nRF \
              --build-dir SlimeVR-Tracker-nRF/build \
              -- \
              -DNCS_TOOLCHAIN_VERSION=NONE \
              -DBOARD_ROOT=../SlimeVR-Tracker-nRF

          HEX_SRC="SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.hex"
          UF2_SRC="SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.uf2"

          if [ -f "$HEX_SRC" ]; then
            mv "$HEX_SRC" "Releases/${{ matrix.boards.filename }}.hex"
          else
            echo "Missing expected HEX output: $HEX_SRC" >&2
            exit 1
          fi

          if [ -f "$UF2_SRC" ]; then
            mv "$UF2_SRC" "Releases/${{ matrix.boards.filename }}.uf2"
          fi

      - name: 💾 Upload Artifact (HEX) - ${{ matrix.boards.boardname }}
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.boards.filename }}.hex
          path: zephyr-workspace/Releases/${{ matrix.boards.filename }}.hex

      - name: 💾 Upload Artifact (UF2) - ${{ matrix.boards.boardname }}
        if: ${{ hashFiles(format('zephyr-workspace/Releases/{0}.uf2', matrix.boards.filename)) != '' }}
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.boards.filename }}.uf2
          path: zephyr-workspace/Releases/${{ matrix.boards.filename }}.uf2

      - name: 📁 Create/Update Github Latest Release
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.gh_token }}
          tag: "latest"
          prerelease: false
          name: "Latest Firmware"
          body: |
            Latest successful SlimeNRF Firmware build. (Automated)
          files: |
            zephyr-workspace/Releases/${{ matrix.boards.filename }}.hex
            zephyr-workspace/Releases/${{ matrix.boards.filename }}.uf2
          clear_attachments: false

      - name: 📁 Create/Update Github Daily Release
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.gh_token }}
          tag: "${{ env.TAG_NAME }}"
          prerelease: true
          name: "${{ env.TAG_NAME }}"
          body: |
            Archive of successful daily SlimeNRF Firmware build. (Automated)
          files: |
            zephyr-workspace/Releases/${{ matrix.boards.filename }}.hex
            zephyr-workspace/Releases/${{ matrix.boards.filename }}.uf2
          clear_attachments: false
